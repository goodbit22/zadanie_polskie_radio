repositories:
- name: bitnami
  url: https://charts.bitnami.com/bitnami
- name: ingress-nginx 
  url: https://kubernetes.github.io/ingress-nginx

releases:

- name: ingress-nginx
  namespace: ingress-nginx
  createNamespace: true
  chart: ingress-nginx/ingress-nginx
  values:
    - './helm-chart/ingress-nginx/values.yaml'

- name: minio
  namespace: minio
  createNamespace: true
  chart: bitnami/minio
  values: 
    - './helm-chart/minio/values.yaml'

- name: nginx-frontend
  namespace: service
  createNamespace: true
  chart: bitnami/nginx
  values: 
    - './helm-chart/nginx-frontend/values.yaml'
  